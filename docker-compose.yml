services:
  # 1. MySQL 数据库容器
  mysql-db:
    image: mysql:8.0
    container_name: flash-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 95515 # 设置 root 密码
      MYSQL_DATABASE: flash_user_db # 启动时自动建好需要的数据库
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # 数据持久化，防止容器重启后数据丢失

  # ==========================================
  # 商品服务专用主库：负责所有写请求
  # ==========================================
  mysql-master:
    image: mysql:8.0
    container_name: flash-mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 95515
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: flash_product_db
    ports:
      - "3307:3306"
    command:
      # 在 Windows + Docker Desktop 场景下，宿主机绑定进去的配置文件权限常常会被容器识别为 world-writable，
      # MySQL 为了安全会直接忽略该配置。这样主从复制最关键的 GTID / server-id / binlog 参数就不会生效，
      # 最终表现为“容器起来了，但复制初始化脚本报 GTID_MODE=OFF”。
      # 把关键参数提升到启动命令里，可以绕开文件权限差异，让作业环境在 Windows 上也稳定复现。
      - --default-authentication-plugin=mysql_native_password
      - --server-id=101
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid_mode=ON
      - --enforce-gtid-consistency=ON
      - --sync-binlog=1
    volumes:
      - mysql_master_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p95515"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ==========================================
  # 商品服务专用从库：负责只读查询
  # ==========================================
  mysql-slave:
    image: mysql:8.0
    container_name: flash-mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 95515
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3308:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --server-id=102
      - --relay-log=relay-bin
      - --log-bin=mysql-bin
      - --log-replica-updates=ON
      - --binlog-format=ROW
      - --gtid_mode=ON
      - --enforce-gtid-consistency=ON
      - --read-only=ON
      - --super-read-only=ON
    volumes:
      - mysql_slave_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p95515"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ==========================================
  # 主从复制初始化器：只负责执行一次复制配置
  # ==========================================
  mysql-replica-init:
    image: mysql:8.0
    container_name: flash-mysql-replica-init
    restart: "no"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
    volumes:
      - ./mysql_readwrite/scripts/init-replica.sh:/scripts/init-replica.sh:ro
    entrypoint: ["bash", "/scripts/init-replica.sh"]

  flash-redis:
    image: redis:alpine
    container_name: flash-redis
    restart: always
    ports:
      # 映射出来，方便查看缓存数据
      - "6379:6379"

  # ==========================================
  # Kafka：负责承接秒杀洪峰，把同步写链路改成异步消费
  # ==========================================
  kafka:
    image: bitnami/kafka:3.7
    container_name: flash-kafka
    restart: always
    ports:
      - "9094:9094"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_KRAFT_CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # 2. 用户微服务容器
  user-service:
    image: raitocc66/flash-user-service:latest
    container_name: flash-user-service
    # ports:
    #   - "8001:8001"
    restart: always
    environment:
      # 极其关键：用环境变量覆盖代码里的 .env 配置！
      # 注意这里的 host 变成了 mysql-db，它会自动解析到上面那个数据库容器的 IP！
      DATABASE_URL: mysql+pymysql://root:95515@mysql-db:3306/flash_user_db
      SECRET_KEY: super_secret_key_for_flash_sale
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      - mysql-db # 保证数据库先启动，微服务后启动

  product-service:
    image: raitocc66/flash-product-service:latest
    # container_name: flash-product-service
    # ports:
    #  - "8002:8002" # 映射物理机的 8002 端口
    restart: always
    deploy:
      replicas: 3 # 修改实例数量改这个数字就行
    environment:
      # WARNING:
      # 这里保留 DATABASE_URL 是为了兼容尚未完成读写分离改造的历史代码或脚本。
      # 真正启用读写分离后，商品服务会优先使用 WRITE_DATABASE_URL 和 READ_DATABASE_URL。
      DATABASE_URL: mysql+pymysql://root:95515@mysql-master:3306/flash_product_db
      # 写请求固定走主库，保证创建商品等写操作命中真正的数据源。
      WRITE_DATABASE_URL: mysql+pymysql://root:95515@mysql-master:3306/flash_product_db
      # 读请求走从库，用来演示典型的读写分离效果。
      READ_DATABASE_URL: mysql+pymysql://root:95515@mysql-slave:3306/flash_product_db
      SECRET_KEY: super_secret_key_for_flash_sale
      ALGORITHM: HS256
      REDIS_URL: redis://flash-redis:6379/0
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      mysql-replica-init:
        condition: service_completed_successfully
      flash-redis:
        condition: service_started

  order-service:
    image: raitocc66/flash-order-service:latest
    container_name: flash-order-service
    restart: always
    # ports:
    #   - "8003:8003"
    environment:
      DATABASE_URL: mysql+pymysql://root:95515@mysql-db:3306/flash_order_db
      SECRET_KEY: super_secret_key_for_flash_sale
      ALGORITHM: HS256
      # 订单服务想找商品服务，必须直接呼叫商品服务的 container_name！
      PRODUCT_SERVICE_URL: http://product-service:8002
      INVENTORY_SERVICE_URL: http://flash-inventory-service:8004
      REDIS_URL: redis://flash-redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_FLASH_SALE_TOPIC: flash-sale-orders
      KAFKA_CONSUMER_GROUP_ID: flash-sale-order-service
      ORDER_ID_WORKER_ID: 1
    depends_on:
      mysql-db:
        condition: service_started
      product-service:
        condition: service_started # 保证商品服务先启动
      inventory-service:
        condition: service_started
      flash-redis:
        condition: service_started
      kafka:
        condition: service_healthy

  # 库存服务
  inventory-service:
    image: raitocc66/flash-inventory-service:latest
    container_name: flash-inventory-service
    restart: always
    # ports:
    #   - "8004:8004"
    environment:
      DATABASE_URL: mysql+pymysql://root:95515@mysql-db:3306/flash_inventory_db
      SECRET_KEY: super_secret_key_for_flash_sale
      ALGORITHM: HS256
      REDIS_URL: redis://flash-redis:6379/0
    depends_on:
      - mysql-db
      - flash-redis

  # === 新增：API 统一网关 ===
  nginx-gateway:
    # image: nginx:alpine
    build:
      context: ./frontend # 告诉它 Dockerfile 在 frontend 文件夹里
    container_name: flash-api-gateway
    restart: always
    ports:
      # 把虚拟机的 8000 端口映射给 Nginx 的 80 端口
      - "8000:80"
    volumes:
      # 把刚才写的配置文件挂载进 Nginx 肚子里
      # 注意这里的路径
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - order-service
      - inventory-service

volumes:
  db_data: # 声明数据卷
  mysql_master_data:
  mysql_slave_data:
  kafka_data:
