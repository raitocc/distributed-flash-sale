services:
  # 1. MySQL 数据库容器
  mysql-db:
    image: mysql:8.0
    container_name: flash-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 95515 # 设置 root 密码
      MYSQL_DATABASE: flash_user_db # 启动时自动建好需要的数据库
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # 数据持久化，防止容器重启后数据丢失

  # ==========================================
  # 商品服务专用主库：负责所有写请求
  # ==========================================
  mysql-master:
    image: mysql:8.0
    container_name: flash-mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 95515
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: flash_product_db
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./mysql_readwrite/master/conf.d/master.cnf:/etc/mysql/conf.d/master.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p95515"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ==========================================
  # 商品服务专用从库：负责只读查询
  # ==========================================
  mysql-slave:
    image: mysql:8.0
    container_name: flash-mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 95515
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3308:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ./mysql_readwrite/slave/conf.d/slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p95515"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ==========================================
  # 主从复制初始化器：只负责执行一次复制配置
  # ==========================================
  mysql-replica-init:
    image: mysql:8.0
    container_name: flash-mysql-replica-init
    restart: "no"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
    volumes:
      - ./mysql_readwrite/scripts/init-replica.sh:/scripts/init-replica.sh:ro
    entrypoint: ["bash", "/scripts/init-replica.sh"]

  flash-redis:
    image: redis:alpine
    container_name: flash-redis
    restart: always
    ports:
      # 映射出来，方便查看缓存数据
      - "6379:6379"

  # 2. 用户微服务容器
  user-service:
    image: raitocc66/flash-user-service:latest
    container_name: flash-user-service
    # ports:
    #   - "8001:8001"
    restart: always
    environment:
      # 极其关键：用环境变量覆盖代码里的 .env 配置！
      # 注意这里的 host 变成了 mysql-db，它会自动解析到上面那个数据库容器的 IP！
      DATABASE_URL: mysql+pymysql://root:95515@mysql-db:3306/flash_user_db
      SECRET_KEY: super_secret_key_for_flash_sale
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      - mysql-db # 保证数据库先启动，微服务后启动

  product-service:
    image: raitocc66/flash-product-service:latest
    # container_name: flash-product-service
    # ports:
    #  - "8002:8002" # 映射物理机的 8002 端口
    restart: always
    deploy:
      replicas: 3 # 修改实例数量改这个数字就行
    environment:
      # WARNING:
      # 这里保留 DATABASE_URL 是为了兼容尚未完成读写分离改造的历史代码或脚本。
      # 真正启用读写分离后，商品服务会优先使用 WRITE_DATABASE_URL 和 READ_DATABASE_URL。
      DATABASE_URL: mysql+pymysql://root:95515@mysql-master:3306/flash_product_db
      # 写请求固定走主库，保证创建商品等写操作命中真正的数据源。
      WRITE_DATABASE_URL: mysql+pymysql://root:95515@mysql-master:3306/flash_product_db
      # 读请求走从库，用来演示典型的读写分离效果。
      READ_DATABASE_URL: mysql+pymysql://root:95515@mysql-slave:3306/flash_product_db
      SECRET_KEY: super_secret_key_for_flash_sale
      ALGORITHM: HS256
      REDIS_URL: redis://flash-redis:6379/0
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      mysql-replica-init:
        condition: service_completed_successfully
      flash-redis:
        condition: service_started

  order-service:
    image: raitocc66/flash-order-service:latest
    container_name: flash-order-service
    restart: always
    # ports:
    #   - "8003:8003"
    environment:
      DATABASE_URL: mysql+pymysql://root:95515@mysql-db:3306/flash_order_db
      SECRET_KEY: super_secret_key_for_flash_sale
      ALGORITHM: HS256
      # 订单服务想找商品服务，必须直接呼叫商品服务的 container_name！
      PRODUCT_SERVICE_URL: http://product-service:8002
      INVENTORY_SERVICE_URL: http://flash-inventory-service:8004
    depends_on:
      - mysql-db
      - product-service # 保证商品服务先启动

  # 库存服务
  inventory-service:
    image: raitocc66/flash-inventory-service:latest
    container_name: flash-inventory-service
    restart: always
    # ports:
    #   - "8004:8004"
    environment:
      DATABASE_URL: mysql+pymysql://root:95515@mysql-db:3306/flash_inventory_db
      SECRET_KEY: super_secret_key_for_flash_sale
      ALGORITHM: HS256
    depends_on:
      - mysql-db

  # === 新增：API 统一网关 ===
  nginx-gateway:
    # image: nginx:alpine
    build:
      context: ./frontend # 告诉它 Dockerfile 在 frontend 文件夹里
    container_name: flash-api-gateway
    restart: always
    ports:
      # 把虚拟机的 8000 端口映射给 Nginx 的 80 端口
      - "8000:80"
    volumes:
      # 把刚才写的配置文件挂载进 Nginx 肚子里
      # 注意这里的路径
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - order-service
      - inventory-service

volumes:
  db_data: # 声明数据卷
  mysql_master_data:
  mysql_slave_data:
