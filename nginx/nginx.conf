events {
    worker_connections 1024;
}

http {
    # ==========================================
    # ⚖️ 负载均衡池 (Upstream)
    # ==========================================
    # 这里定义了内部微服务的花名册。现在每个池子里只有一台机器，
    # 以后如果要抗高并发，直接在这里加机器 IP 就行！
    upstream user_service {
        server flash-user-service:8001;
    }
    
    upstream product_service {
        # 演示负载均衡：以后可以在这里加上 weight=2 等分配权重
        server flash-product-service:8002;
    }
    
    upstream order_service {
        server flash-order-service:8003;
    }
    
    upstream inventory_service {
        server flash-inventory-service:8004;
    }

    # ==========================================
    # 🚪 统一网关大门 (Server)
    # ==========================================
    server {
        listen 80; # Nginx 容器内部监听 80 端口
        server_name localhost;

        # 解决跨域问题 (如果前端和后端域名不同的话)
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
        add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';

        # 🚦 路由分发规则
        location /api/users {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/products {
            proxy_pass http://product_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/orders {
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/inventory {
            proxy_pass http://inventory_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}